<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안정성 시험 관리 시스템 | Stability LIMS Lite</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; padding: 20px; background: #f4f7f9; color: #333; line-height: 1.5; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        h2 { color: #1a73e8; border-left: 5px solid #1a73e8; padding-left: 15px; margin-bottom: 30px; }
        h3 { margin-top: 0; color: #5f6368; font-size: 18px; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        /* 입력 폼 그리드 */
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; background: #f8f9fa; padding: 25px; border-radius: 10px; border: 1px solid #e9ecef; }
        .form-group { display: flex; flex-direction: column; }
        .full-width { grid-column: span 2; }
        
        label { font-weight: 600; margin-bottom: 8px; font-size: 14px; color: #495057; }
        input, select { padding: 12px; border: 1px solid #ced4da; border-radius: 6px; transition: border-color 0.2s; font-size: 14px; }
        input:focus { border-color: #1a73e8; outline: none; box-shadow: 0 0 0 3px rgba(26,115,232,0.1); }

        /* 버튼 영역 */
        .btn-group { display: flex; gap: 15px; margin-bottom: 40px; }
        button { flex: 1; padding: 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: all 0.2s; }
        
        .btn-calc { background: #1a73e8; color: white; }
        .btn-calc:hover { background: #1557b0; transform: translateY(-1px); }
        .btn-save { background: #34a853; color: white; }
        .btn-save:hover { background: #2d8e47; transform: translateY(-1px); }

        /* 테이블 공통 */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 14px; border-bottom: 1px solid #eee; text-align: center; font-size: 14px; }
        th { background: #f1f3f5; color: #495057; font-weight: 600; }
        
        /* 결과 및 이력 섹션 */
        .section { margin-bottom: 50px; }
        .tag { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        .tag-장기 { background: #e8f0fe; color: #1967d2; }
        .tag-가속 { background: #fef7e0; color: #ea8600; }
        .tag-가혹 { background: #fce8e6; color: #d93025; }
        
        .calendar-btn { background: #fff; border: 1px solid #34a853; color: #34a853; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .calendar-btn:hover { background: #34a853; color: #white; }
        
        #historyTable tr:hover { background-color: #f8f9fa; }
    </style>
</head>
<body>

<div class="container">
    <h2>💊 안정성 시험 관리 시스템</h2>
    
    <div class="grid-form">
        <div class="form-group">
            <label>안정성 시험 번호</label>
            <input type="text" id="testNo" placeholder="예: 17ND01ST01">
        </div>
        <div class="form-group">
            <label>시험 종류 (Condition)</label>
            <select id="category">
                <option value="장기">장기보존 (25°C/60%RH)</option>
                <option value="가속">가속 (40°C/75%RH)</option>
                <option value="가혹">가혹 (60°C/80%RH)</option>
            </select>
        </div>
        <div class="form-group">
            <label>제품명</label>
            <input type="text" id="productName" placeholder="제품명을 입력하세요">
        </div>
        <div class="form-group">
            <label>배치 번호 (Batch No.)</label>
            <input type="text" id="batchNo" placeholder="배치번호를 입력하세요">
        </div>
        <div class="form-group">
            <label>시험 시작일 (Day 0)</label>
            <input type="date" id="startDate">
        </div>
        <div class="form-group">
            <label>시점 단위</label>
            <select id="unit">
                <option value="month">개월 (Months)</option>
                <option value="week">주 (Weeks)</option>
            </select>
        </div>
        <div class="form-group full-width">
            <label>시험 시점 입력 (쉼표로 구분)</label>
            <input type="text" id="intervals" placeholder="예: 0, 3, 6, 9, 12, 18, 24">
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-calc" onclick="calculate()">1. 일정 계산하기</button>
        <button class="btn-save" onclick="saveToDB()">2. DB에 저장 및 이력 기록</button>
    </div>

    <div id="resultArea" class="section" style="display:none;">
        <h3>📅 계산된 스케줄 (임시)</h3>
        <table id="calcTable">
            <thead>
                <tr>
                    <th>구분</th>
                    <th>시점</th>
                    <th>예정일 (Target Date)</th>
                    <th>액션</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <div style="margin-top: 15px; text-align: right;">
            <button onclick="addAllToGoogle()" style="background:#555; color:white; width:auto; padding:10px 20px;">🗓️ 모든 일정 구글 캘린더 등록</button>
        </div>
    </div>

    <div class="section">
        <h3>📂 등록 이력 (최근 저장 데이터)</h3>
        <table id="historyTable">
            <thead>
                <tr>
                    <th>시험번호</th>
                    <th>제품명(배치)</th>
                    <th>종류</th>
                    <th>시작일</th>
                    <th>저장일시</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>

<script>
    // --- [중요] Supabase 설정 ---
    // 본인의 Supabase Project Settings -> API에서 복사한 값을 넣어주세요.
    const SUPABASE_URL = 'https://ruqgzzwdygijphijvcpx.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_ECWc7uCnjXjqT8v4JzLFSQ_FBAAddo1';
    
    // Supabase 클라이언트 초기화
    // 라이브러리에서 createClient 함수를 명확히 가져온 후 초기화합니다.
    const { createClient } = supabase;
    const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    let tempSchedule = [];

    // 폼 데이터를 가져오는 함수 (ID값 일치 확인 완료)
    function getFormData() {
        return {
            test_no: document.getElementById('testNo').value.trim(),
            category: document.getElementById('category').value,
            product_name: document.getElementById('productName').value.trim(),
            batch_no: document.getElementById('batchNo').value.trim(),
            start_date: document.getElementById('startDate').value,
            unit: document.getElementById('unit').value,
            intervals: document.getElementById('intervals').value.trim()
        };
    }

    // 1. 일정 계산 로직
    function calculate() {
        const data = getFormData();

        // 필수 항목 검증
        if(!data.test_no || !data.start_date || !data.intervals) {
            alert("시험 번호, 시작일, 시점은 필수 입력 항목입니다.");
            return;
        }

        const intervalArray = data.intervals.split(',')
            .map(i => parseInt(i.trim()))
            .filter(n => !isNaN(n));

        const tbody = document.querySelector('#calcTable tbody');
        tbody.innerHTML = '';
        tempSchedule = [];

        intervalArray.sort((a,b) => a - b).forEach(val => {
            let d = new Date(data.start_date);
            if (data.unit === 'month') {
                d.setMonth(d.getMonth() + val);
            } else {
                d.setDate(d.getDate() + (val * 7));
            }
            
            const dateStr = d.toISOString().split('T')[0];
            const unitText = data.unit === 'month' ? 'M' : 'W';
            const point = val === 0 ? 'Initial' : val + unitText;

            tempSchedule.push({ ...data, point, dateStr });

            tbody.innerHTML += `
                <tr>
                    <td><span class="tag tag-${data.category}">${data.category}</span></td>
                    <td>${point}</td>
                    <td><strong>${dateStr}</strong></td>
                    <td><button class="calendar-btn" onclick="addGoogleOne('${data.category}','${data.product_name}','${data.batch_no}','${point}','${dateStr}')">구글 등록</button></td>
                </tr>`;
        });

        document.getElementById('resultArea').style.display = 'block';
    }

    // 2. DB 저장 로직
    async function saveToDB() {
        const data = getFormData();

        if(!data.test_no || !data.start_date) {
            alert("저장할 데이터가 부족합니다. 시험 정보를 먼저 입력해주세요.");
            return;
        }

        const { error } = await _supabase
            .from('stability_tests') // Supabase에 만든 테이블 이름과 일치해야 함
            .insert([data]);

        if (error) {
            console.error("DB 저장 에러:", error);
            alert("저장 실패: " + error.message);
        } else {
            alert("DB에 성공적으로 저장되었습니다.");
            loadHistory(); // 목록 새로고침
        }
    }

    // 3. DB 이력 불러오기 로직
    async function loadHistory() {
        const { data, error } = await _supabase
            .from('stability_tests')
            .select('*')
            .order('created_at', { ascending: false })
            .limit(10); // 최근 10개만 표시

        if (error) {
            console.error("데이터 로드 실패:", error);
            return;
        }

        const tbody = document.querySelector('#historyTable tbody');
        tbody.innerHTML = data.map(item => `
            <tr>
                <td>${item.test_no}</td>
                <td>${item.product_name}<br><small>(${item.batch_no})</small></td>
                <td><span class="tag tag-${item.category}">${item.category}</span></td>
                <td>${item.start_date}</td>
                <td>${new Date(item.created_at).toLocaleDateString()}</td>
            </tr>
        `).join('');
    }

    // 4. 구글 캘린더 연동 (개별)
    function addGoogleOne(cat, prod, batch, point, date) {
        const title = encodeURIComponent(`[${cat}] ${prod}(${batch}) - ${point}`);
        const details = encodeURIComponent(`배치: ${batch}\n시점: ${point}\n조건: ${cat}`);
        const cleanDate = date.replace(/-/g, '');
        // 팀 공용 캘린더 ID (리더님의 ID로 되어 있음)
        const calId = "f6ae7e773666b089fbc8c96a129cef7ecebc00334130561e36d6f438b66f1782@group.calendar.google.com";
        
        const url = `https://www.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${cleanDate}/${cleanDate}&details=${details}&src=${calId}`;
        window.open(url, '_blank');
    }

    // 5. 모든 일정 구글 캘린더 등록 (일괄)
    function addAllToGoogle() {
        if(tempSchedule.length === 0) return;
        const confirmMsg = `총 ${tempSchedule.length}개의 일정을 등록합니다. 팝업 차단을 해제해 주세요.`;
        if(confirm(confirmMsg)) {
            tempSchedule.forEach((s, i) => {
                setTimeout(() => {
                    addGoogleOne(s.category, s.product_name, s.batch_no, s.point, s.dateStr);
                }, i * 400);
            });
        }
    }

    // 페이지 내용이 로드되면 즉시 DB에서 데이터를 가져오도록 설정합니다.
    document.addEventListener('DOMContentLoaded', () => {
    loadHistory();
});

</script>
</body>
</html>
