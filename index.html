<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>의약품 안정성 시험 스케줄러 Pro</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { color: #1a73e8; border-bottom: 3px solid #1a73e8; padding-bottom: 10px; margin-bottom: 25px; }
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 8px; color: #5f6368; }
        input, select { padding: 12px; border: 1px solid #dadce0; border-radius: 8px; font-size: 14px; }
        input:focus { border-color: #1a73e8; outline: none; }
        .full-width { grid-column: span 2; }
        button { background: #1a73e8; color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #1557b0; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; background: #fff; }
        th, td { border: 1px solid #eee; padding: 15px; text-align: center; }
        th { background: #f8f9fa; color: #5f6368; }
        .category-tag { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .tag-장기 { background: #e8f0fe; color: #1967d2; }
        .tag-가속 { background: #fef7e0; color: #ea8600; }
        .tag-가혹 { background: #fce8e6; color: #d93025; }
        .calendar-btn { background: #34a853; padding: 6px 12px; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🧪 의약품 안정성 시험 일정 관리</h2>
    
    <div class="grid-form">
        <div class="form-group">
            <label>안정성 시험 번호</label>
            <input type="text" id="testNo" placeholder="예: ST-2026-001">
        </div>
        <div class="form-group">
            <label>시험 카테고리</label>
            <select id="category">
                <option value="장기">장기보존 (25°C/60%RH)</option>
                <option value="가속">가속 (40°C/75%RH)</option>
                <option value="가혹">가혹 (특수 조건)</option>
            </select>
        </div>
        <div class="form-group">
            <label>제품명</label>
            <input type="text" id="productName" placeholder="예: 타이레놀정 500mg">
        </div>
        <div class="form-group">
            <label>배치 번호 (Batch No.)</label>
            <input type="text" id="batchNo" placeholder="예: BT26L01">
        </div>
        <div class="form-group">
            <label>시험 시작일 (Day 0)</label>
            <input type="date" id="startDate">
        </div>
        <div class="form-group">
            <label>시점 단위</label>
            <select id="unit">
                <option value="month">개월 (Months)</option>
                <option value="week">주 (Weeks)</option>
            </select>
        </div>
        <div class="form-group full-width">
            <label>시험 시점 입력 (쉼표로 구분)</label>
            <input type="text" id="intervals" placeholder="예: 0, 3, 6, 9, 12 (0은 초기시험)">
        </div>
    </div>

    <button onclick="calculateStability()">일정 계산 및 생성</button>

    <div id="resultArea" style="display:none;">
        <h3>📋 생성된 시험 스케줄</h3>
        <table id="scheduleTable">
            <thead>
                <tr>
                    <th>구분</th>
                    <th>시점</th>
                    <th>예정일 (Target Date)</th>
                    <th>액션</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    function calculateStability() {
        const testNo = document.getElementById('testNo').value;
        const category = document.getElementById('category').value;
        const product = document.getElementById('productName').value;
        const batch = document.getElementById('batchNo').value;
        const startDateVal = document.getElementById('startDate').value;
        const unit = document.getElementById('unit').value;
        const intervalInput = document.getElementById('intervals').value;

        if(!testNo || !startDateVal || !intervalInput) {
            alert("필수 항목(시험번호, 시작일, 시점)을 입력해주세요.");
            return;
        }

        // 입력받은 시점을 배열로 변환 (공백 제거 및 숫자화)
        const intervalArray = intervalInput.split(',').map(item => parseInt(item.trim())).filter(n => !isNaN(n));
        
        const tbody = document.querySelector('#scheduleTable tbody');
        tbody.innerHTML = '';

        intervalArray.sort((a, b) => a - b).forEach(val => {
            const date = new Date(startDateVal);
            
            if (unit === 'month') {
                date.setMonth(date.getMonth() + val);
            } else {
                date.setDate(date.getDate() + (val * 7));
            }
            
            const dateString = date.toISOString().split('T')[0];
            const unitText = unit === 'month' ? '개월' : '주';
            const displayPoint = val === 0 ? 'Initial (0)' : `${val}${unitText}`;

            const row = `<tr>
                <td><span class="category-tag tag-${category}">${category}</span></td>
                <td>${displayPoint}</td>
                <td><strong>${dateString}</strong></td>
                <td><button class="calendar-btn" onclick="addGoogle('${testNo}', '${category}', '${product}', '${batch}', '${displayPoint}', '${dateString}')">구글 등록</button></td>
            </tr>`;
            tbody.innerHTML += row;
        });

        document.getElementById('resultArea').style.display = 'block';
    }

    function addGoogle(no, cat, prod, batch, point, date) {
        const title = encodeURIComponent(`[${cat}] ${prod}(${batch}) - ${point}`);
        const details = encodeURIComponent(`시험번호: ${no}\n제품명: ${prod}\nBatch: ${batch}\n조건: ${cat}\n시점: ${point}`);
        const cleanDate = date.replace(/-/g, '');
        const url = `https://www.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${cleanDate}/${cleanDate}&details=${details}`;
        window.open(url, '_blank');
    }
</script>

</body>
</html>
